html,body{height:100%;overflow:hidden}
body{font-family:'Barlow',sans-serif;background:var(--bg);display:flex;flex-direction:column}

/* ── HEADER ── */

.header-logo{

.header-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.5px;line-height:1.2;flex:1}

.header-link{color:white;opacity:0.7;font-size:11px;text-decoration:none;flex-shrink:0;padding:4px 8px;background:rgba(255,255,255,0.15);border-radius:6px}

/* ── PROGRESS ── */
.progress-wrap{padding:0 0 10px}
.progress-bar{height:6px;background:rgba(255,255,255,0.25);border-radius:3px;overflow:hidden;margin-bottom:5px}
.progress-fill{height:100%;background:white;border-radius:3px;transition:width 0.35s ease;width:0%}
.progress-label{font-size:11px;opacity:0.85;display:flex;justify-content:space-between}
.progress-pct{font-weight:700}

/* ── TABS ── */
.tabs{display:flex;gap:0;background:rgba(0,0,0,0.2);border-radius:8px 8px 0 0;overflow-x:auto;margin-top:2px}
.tab{flex-shrink:0;padding:8px 12px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:rgba(255,255,255,0.65);cursor:pointer;border:none;background:none;transition:all 0.2s;white-space:nowrap}
.tab.active{background:var(--bg);color:var(--rouge-f);border-radius:8px 8px 0 0}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:12px 12px 100px;-webkit-overflow-scrolling:touch}

/* ── SECTION ── */

.section-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none}
.section-header:active{opacity:0.85}
.section-left{display:flex;align-items:center;gap:8px}
.section-icon{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.5);flex-shrink:0}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:white;letter-spacing:0.4px;text-transform:uppercase}
.section-pill{background:rgba(255,255,255,0.2);color:white;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;white-space:nowrap}
.section-pill.done{background:rgba(255,255,255,0.4)}
.chevron{color:rgba(255,255,255,0.6);font-size:12px;transition:transform 0.2s;flex-shrink:0;margin-left:4px}
.section-card.collapsed .chevron{transform:rotate(-90deg)}
.section-card.collapsed .items{display:none}
.section-card.all-done .section-header{opacity:0.7}

/* ── ITEMS ── */
.items{border-top:1px solid rgba(0,0,0,0.06)}
.item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid #F3F3F3;cursor:pointer;transition:background 0.15s;-webkit-user-select:none;user-select:none}
.item:last-child{border-bottom:none}
.item:active{background:#F5F5F5}
.item.checked{background:var(--ok-light)}
.item.checked .item-name{color:#888;text-decoration:line-through;text-decoration-color:#AAA}
.check-box{width:26px;height:26px;flex-shrink:0;border:2px solid #D0D0D0;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:15px;font-weight:700}
.item.checked .check-box{background:var(--ok);border-color:var(--ok);color:white}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

const STORAGE_KEY = 'sdis42_checks_v2';
let currentPageIdx = 0;
let checks = loadChecks();

/* Couleurs */
const COLORS = {
  'c-rouge':'#CC2020','c-orange':'#D97820','c-vert':'#2A7B35',
  'c-bleu':'#1458A8','c-jaune':'#E8A000','c-gris':'#3C3C3C'
};

function loadChecks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveChecks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checks)); }
  catch(e) {}
}

/* ── Init ── */
function init() {
  buildTabs();
  renderPage(currentPageIdx);
}

function buildTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  defaultPages.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = p.nom.split('—')[0].trim();
    btn.onclick = () => switchTab(i);
    tabs.appendChild(btn);
  });
}

function switchTab(idx) {
  currentPageIdx = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  renderPage(idx);
  window.scrollTo(0,0);
  document.getElementById('content').scrollTop = 0;
}

function renderPage(idx) {
  const page = defaultPages[idx];
  const pid  = 'p' + idx;
  if (!checks[pid]) checks[pid] = {};
  const content = document.getElementById('content');
  content.innerHTML = '';

  if (!page.cellules || page.cellules.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="es-icon">📦</div><p>Aucun article dans cet inventaire.</p></div>';
    updateProgress(idx); return;
  }

  page.cellules.forEach((cel, ci) => {
    if (!cel.items || cel.items.length === 0) return;
    const doneCount = cel.items.filter((_,ii) => checks[pid][cel.id+'_'+ii]).length;
    const allDone   = doneCount === cel.items.length;
    const color     = COLORS[cel.couleur] || '#CC2020';

    const card = document.createElement('div');
    card.className = 'section-card' + (allDone ? ' all-done' : '');

    card.innerHTML =
      '<div class="section-header" style="background:'+color+'" onclick="toggleSection(this)">' +
        '<div class="section-left">' +
          '<div class="section-icon"></div>' +
          '<div class="section-title">'+cel.titre+'</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px">' +
          '<span class="section-pill'+(allDone?' done':'')+'">'+doneCount+'/'+cel.items.length+'</span>' +
          '<span class="chevron">▾</span>' +
        '</div>' +
      '</div>' +
      '<div class="items"></div>';

    const itemsDiv = card.querySelector('.items');
    cel.items.forEach((item, ii) => {
      const key   = cel.id + '_' + ii;
      const isChk = !!checks[pid][key];
      const row   = document.createElement('div');
      row.className = 'item' + (isChk ? ' checked' : '');
      row.innerHTML =
        '<div class="check-box">'+(isChk?'✓':'')+'</div>' +
        '<div class="item-name">'+(item.n||'')+'</div>' +
        (item.q ? '<div class="item-qty">×'+item.q+'</div>' : '');
      row.onclick = () => toggleItem(idx, cel, ii);
      itemsDiv.appendChild(row);
    });

    content.appendChild(card);
  });
  updateProgress(idx);
}

function toggleSection(header) {
  header.closest('.section-card').classList.toggle('collapsed');
}

function toggleItem(pageIdx, cel, itemIdx) {
  const pid = 'p' + pageIdx;
  const key = cel.id + '_' + itemIdx;
  checks[pid][key] = !checks[pid][key];
  saveChecks();
  renderPage(pageIdx);
}

function updateProgress(idx) {
  const page = defaultPages[idx];
  const pid  = 'p' + idx;
  let total = 0, done = 0;
  (page.cellules || []).forEach(cel => {
    (cel.items || []).forEach((_,ii) => {
      total++;
      if (checks[pid] && checks[pid][cel.id+'_'+ii]) done++;
    });
  });
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = done + ' / ' + total + ' articles';
  document.getElementById('prog-pct').textContent  = pct + '%';
}

/* ── Reset ── */
function resetCurrent() {
  if (!confirm('Réinitialiser tous les articles de cet engin ?')) return;
  checks['p'+currentPageIdx] = {};
  saveChecks();
  renderPage(currentPageIdx);
}

/* ── Validation ── */
function validate() {
  const page = defaultPages[currentPageIdx];
  const pid  = 'p' + currentPageIdx;
  let total = 0, done = 0;
  const missingSections = {};

  (page.cellules || []).forEach(cel => {
    (cel.items || []).forEach((item, ii) => {
      total++;
      if (checks[pid] && checks[pid][cel.id+'_'+ii]) {
        done++;
      } else {
        if (!missingSections[cel.titre]) missingSections[cel.titre] = [];
        missingSections[cel.titre].push((item.n||'') + (item.q ? ' ×'+item.q : ''));
      }
    });
  });

  const missingCount = Object.values(missingSections).reduce((s,a) => s+a.length, 0);
  const now = new Date().toLocaleString('fr-FR', {
    weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit'
  });

  document.getElementById('r-icon').textContent = missingCount === 0 ? '✅' : '⚠️';

  const titleEl = document.getElementById('r-title');
  if (missingCount === 0) {
    titleEl.textContent = 'Vérification terminée, aucun problème détecté';
    titleEl.className = 'result-title ok';
    document.getElementById('r-sub').textContent = done+'/'+total+' articles vérifiés · '+page.nom;
    document.getElementById('r-missing').style.display = 'none';
    document.getElementById('r-consigne').style.display = 'none';
  } else {
    titleEl.textContent = 'Problème dans l\'inventaire';
    titleEl.className = 'result-title ko';
    document.getElementById('r-sub').textContent = missingCount+' article(s) non vérifié(s) sur '+total+' · '+page.nom;

    let html = '';
    Object.entries(missingSections).forEach(([sec, items]) => {
      html += '<div class="miss-section">'+sec+'</div>';
      items.forEach(item => {
        html += '<div class="miss-item"><span style="font-size:9px;flex-shrink:0">●</span>'+item+'</div>';
      });
    });
    document.getElementById('r-missing').innerHTML = html;
    document.getElementById('r-missing').style.display = 'block';
    document.getElementById('r-consigne').innerHTML =
      '⚠️ <strong>Merci de mettre le matériel manquant dans le véhicule.</strong><br>' +
      'Le cas échéant : <strong>le signaler au chef de garde.</strong>';
    document.getElementById('r-consigne').style.display = 'block';
  }

  document.getElementById('r-time').textContent = now;
  document.getElementById('result-modal').classList.add('open');
}

function closeResult() {
  document.getElementById('result-modal').classList.remove('open');
}
function handleModalClick(e) {
  if (e.target === document.getElementById('result-modal')) closeResult();
}

/* ── Deep link depuis QR code ── */
function handleHash() {
  const hash = decodeURIComponent(window.location.hash.replace('#',''));
  if (hash) {
    const idx = defaultPages.findIndex(p => p.nom === hash);
    if (idx >= 0) switchTab(idx);
  }
}

init();
handleHash();
window.addEventListener('hashchange', handleHash);
</script>
